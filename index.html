<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>감정 기반 영화 추천 서비스</title>
</head>
<body style="text-align: center; font-family: sans-serif; background-color: #000000; color: #ffffff; padding: 80px 10px; margin: 0; box-sizing: border-box; overflow-x: hidden;">

    <div style="position: fixed; left: 0; top: 0; width: 100%; height: 100%; z-index: 1; opacity: 0.12; pointer-events: none;">
        <svg width="100%" height="100%" viewBox="0 0 1000 1000" preserveAspectRatio="none">
            <g stroke="#ffffff" fill="none">
                <g transform="rotate(15, 500, 500)">
                    <line x1="-200" y1="200" x2="1200" y2="200" stroke-width="4" />
                    <line x1="-200" y1="420" x2="1200" y2="420" stroke-width="4" />
                    <line x1="-200" y1="215" x2="1200" y2="215" stroke-width="5" stroke-dasharray="15, 30" />
                    <line x1="-200" y1="405" x2="1200" y2="405" stroke-width="5" stroke-dasharray="15, 30" />
                    <path d="M -100 200 L -100 420 M 150 200 L 150 420 M 400 200 L 400 420 M 650 200 L 650 420 M 900 200 L 900 420 M 1150 200 L 1150 420" stroke-width="2" />
                </g>
                <g transform="rotate(-15, 500, 500)">
                    <line x1="-200" y1="820" x2="1200" y2="820" stroke-width="4" />
                    <line x1="-200" y1="1040" x2="1200" y2="1040" stroke-width="4" />
                    <line x1="-200" y1="835" x2="1200" y2="835" stroke-width="5" stroke-dasharray="15, 30" />
                    <line x1="-200" y1="1025" x2="1200" y2="1025" stroke-width="5" stroke-dasharray="15, 30" />
                    <path d="M -50 820 L -50 1040 M 200 820 L 200 1040 M 450 820 L 450 1040 M 700 820 L 700 1040 M 950 820 L 950 1040 M 1200 820 L 1200 1040" stroke-width="2" />
                </g>
            </g>
        </svg>
    </div>

    <div style="position: relative; z-index: 2; max-width: 1000px; margin: 0 auto;">
        <h1 style="color: #E50914; font-size: 36px; font-weight: 900; margin-bottom: 10px; letter-spacing: -1px;">지금 어떤 감정을 느끼고 싶으신가요?</h1>
        <p style="color: #8c8c8c; font-size: 16px;">감정을 선택하면 영화를 추천해 드립니다.</p>

        <br>

        <h3 style="color: #fff; text-align: left; max-width: 900px; margin: 0 auto 15px auto; font-size: 18px;">🧠 감정 선택하기</h3>
        
        <div style="background: #141414; max-width: 900px; margin: 0 auto; padding: 25px; border-radius: 4px; box-shadow: 0px 4px 20px rgba(0,0,0,0.8); display: flex; flex-wrap: wrap; gap: 12px; justify-content: center;">
            <button onclick="showMovies('울고 싶어')" style="padding: 12px 24px; font-size: 15px; border: 1px solid #333; border-radius: 4px; background: #222; color: #fff; cursor: pointer; font-weight: bold; transition: 0.2s;">😭 울고 싶어</button>
            <button onclick="showMovies('웃고 싶어')" style="padding: 12px 24px; font-size: 15px; border: 1px solid #333; border-radius: 4px; background: #222; color: #fff; cursor: pointer; font-weight: bold; transition: 0.2s;">😁 웃고 싶어</button>
            <button onclick="showMovies('감동받고 싶어')" style="padding: 12px 24px; font-size: 15px; border: 1px solid #333; border-radius: 4px; background: #222; color: #fff; cursor: pointer; font-weight: bold; transition: 0.2s;">✨ 감동받고 싶어</button>
            <button onclick="showMovies('설레고 싶어')" style="padding: 12px 24px; font-size: 15px; border: 1px solid #333; border-radius: 4px; background: #222; color: #fff; cursor: pointer; font-weight: bold; transition: 0.2s;">💖 설레고 싶어</button>
            <button onclick="showMovies('긴장감을 느끼고 싶어')" style="padding: 12px 24px; font-size: 15px; border: 1px solid #333; border-radius: 4px; background: #222; color: #fff; cursor: pointer; font-weight: bold; transition: 0.2s;">⚡ 긴장감을 느끼고 싶어</button>
            <button onclick="showMovies('몰입하고 싶어')" style="padding: 12px 24px; font-size: 15px; border: 1px solid #333; border-radius: 4px; background: #222; color: #fff; cursor: pointer; font-weight: bold; transition: 0.2s;">🎬 몰입하고 싶어</button>
            <button onclick="showMovies('반전을 보고 싶어')" style="padding: 12px 24px; font-size: 15px; border: 1px solid #333; border-radius: 4px; background: #222; color: #fff; cursor: pointer; font-weight: bold; transition: 0.2s;">🌀 반전을 보고 싶어</button>
            <button onclick="showMovies('생각하게 만드는 영화를 보고 싶어')" style="padding: 12px 24px; font-size: 15px; border: 1px solid #333; border-radius: 4px; background: #222; color: #fff; cursor: pointer; font-weight: bold; transition: 0.2s;">💡 생각하게 만드는 영화를 보고 싶어</button>
            <button onclick="showMovies('성장 이야기가 보고 싶어')" style="padding: 12px 24px; font-size: 15px; border: 1px solid #333; border-radius: 4px; background: #222; color: #fff; cursor: pointer; font-weight: bold; transition: 0.2s;">🌱 성장 이야기가 보고 싶어</button>
            <button onclick="showMovies('미장센이 좋은 영화를 보고 싶어')" style="padding: 12px 24px; font-size: 15px; border: 1px solid #333; border-radius: 4px; background: #222; color: #fff; cursor: pointer; font-weight: bold; transition: 0.2s;">🎨 미장센이 좋은 영화를 보고 싶어</button>
            <button onclick="showMovies('음악이 좋은 영화를 보고 싶어')" style="padding: 12px 24px; font-size: 15px; border: 1px solid #333; border-radius: 4px; background: #222; color: #fff; cursor: pointer; font-weight: bold; transition: 0.2s;">🎵 음악이 좋은 영화를 보고 싶어</button>
            <button onclick="showMovies('가벼운 마음으로 시간을 보내고 싶어')" style="padding: 12px 24px; font-size: 15px; border: 1px solid #333; border-radius: 4px; background: #222; color: #fff; cursor: pointer; font-weight: bold; transition: 0.2s;">🎈 가벼운 마음으로 시간을 보내고 싶어</button>
            <button onclick="showMovies('친구랑 보고 싶어')" style="padding: 12px 24px; font-size: 15px; border: 1px solid #333; border-radius: 4px; background: #222; color: #fff; cursor: pointer; font-weight: bold; transition: 0.2s;">🙌 친구랑 보고 싶어</button>
            <button onclick="showMovies('가족이랑 보고 싶어')" style="padding: 12px 24px; font-size: 15px; border: 1px solid #333; border-radius: 4px; background: #222; color: #fff; cursor: pointer; font-weight: bold; transition: 0.2s;">🏡 가족이랑 보고 싶어</button>
        </div>

        <br><br><br>

        <div id="result-section" style="display: none; max-width: 900px; margin: 0 auto; gap: 30px; text-align: left; box-sizing: border-box;">
            
            <div style="flex: 1.2;">
                <h3 id="selected-emotion-title" style="color: #fff; margin-top: 0; font-size: 18px;">🎬 추천 영화 목록</h3>
                <div id="movie-list-container" style="display: flex; flex-direction: column; gap: 15px; max-height: 480px; overflow-y: auto; padding-right: 8px;">
                    <div style="background: #141414; padding: 30px; border-radius: 4px; border: 1px solid #222; text-align: center; color: #8c8c8c;">
                        <p style="margin: 0; font-size: 15px;">선택한 감정에 맞는 영화 목록이 여기에 표시됩니다.</p>
                        <span style="font-size: 13px; color: #555;">(API 연동 후 실시간 로드 예정)</span>
                    </div>
                </div>
            </div>

            <div style="flex: 1; background: #141414; padding: 25px; border-radius: 4px; border: 1px solid #222; box-shadow: 0px 4px 20px rgba(0,0,0,0.8); align-self: flex-start;">
                <h3 style="color: #fff; margin-top: 0; border-bottom: 2px solid #E50914; padding-bottom: 10px; font-size: 18px;">🔍 영화 상세 정보</h3>
                <h2 id="detail-title" style="margin: 0 0 15px 0; color: #fff; font-size: 24px;">영화 제목</h2>
                
                <div style="margin-bottom: 20px;">
                    <span style="font-size: 13px; color: #8c8c8c; display: block; margin-bottom: 8px;">📺 시청 가능한 OTT 및 가격 정보</span>
                    
                    <div id="detail-ott" style="display: flex; flex-direction: column; gap: 8px;">
                        </div>
                </div>
                
                <div style="font-size: 14px; color: #ccc; line-height: 1.8; margin-bottom: 20px; background: #1f1f1f; padding: 15px; border-radius: 4px;">
                    <p style="margin: 4px 0;"><strong style="color: #8c8c8c;">🎦 장르 :</strong> <span id="detail-genre">-</span></p>
                    <p style="margin: 4px 0;"><strong style="color: #8c8c8c;">📅 개봉 연도 :</strong> <span id="detail-year">-</span></p>
                    <p style="margin: 4px 0;"><strong style="color: #8c8c8c;">⏱️ 상영 시간 :</strong> <span id="detail-time">-</span></p>
                    <p style="margin: 4px 0;"><strong style="color: #8c8c8c;">⭐️ 평점 :</strong> <span id="detail-rating">-</span></p>
                </div>
                
                <div style="text-align: left;">
                    <h4 style="margin: 0 0 8px 0; color: #fff; font-size: 15px;">💬 베스트 평론</h4>
                    <div style="background: rgba(46, 204, 113, 0.05); border-left: 4px solid #2ecc71; padding: 10px 12px; margin-bottom: 10px; border-radius: 0 4px 4px 0;">
                        <span style="color: #2ecc71; font-weight: bold; font-size: 12px;">👍 긍정 한줄평</span>
                        <p id="detail-pos" style="margin: 5px 0 0 0; font-size: 13px; color: #666; font-style: italic;">선택된 영화가 없습니다.</p>
                    </div>
                    <div style="background: rgba(231, 76, 60, 0.05); border-left: 4px solid #e74c3c; padding: 10px 12px; border-radius: 0 4px 4px 0;">
                        <span style="color: #e74c3c; font-weight: bold; font-size: 12px;">👎 부정 한줄평</span>
                        <p id="detail-neg" style="margin: 5px 0 0 0; font-size: 13px; color: #666; font-style: italic;">선택된 영화가 없습니다.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
<script>

const API_BASE = '';

function showMovies(emotionName) {

    const resultSection = document.getElementById('result-section');
    const title = document.getElementById('selected-emotion-title');
    const listContainer = document.getElementById('movie-list-container');

    resultSection.style.display = 'flex';

    title.innerText = `🎬 '${emotionName}' 추천 영화`;

    listContainer.innerHTML =
        `<div style="padding:20px;color:#888;">불러오는 중...</div>`;

    fetch(`${API_BASE}/api/movies?emotion=${encodeURIComponent(emotionName)}`)
        .then(res => res.json())
        .then(res => {

            listContainer.innerHTML = '';

            if (res.data.length === 0) {
                listContainer.innerHTML =
                    `<div style="padding:20px;color:#888;">추천 영화 없음</div>`;
                return;
            }

            res.data.forEach(movie => {

                const card = document.createElement('div');

                card.style.cssText =
                    'background:#1f1f1f;padding:15px;border:1px solid #333;border-radius:4px;cursor:pointer';

                card.innerHTML = `
                    <h4 style="margin:0;color:white;">${movie.title}</h4>
                `;

                card.onclick = () => renderDetail(movie);

                listContainer.appendChild(card);
            });

            renderDetail(res.data[0]);
        })
        .catch(err => {
            console.error(err);
            listContainer.innerHTML =
                `<div style="padding:20px;color:red;">API 연결 실패</div>`;
        });

    setTimeout(() => {
        resultSection.scrollIntoView({
            behavior:'smooth'
        });
    },50);
}


function renderDetail(movie) {

    document.getElementById('detail-title').innerText =
        movie.title || '-';

    document.getElementById('detail-genre').innerText =
        movie.genre || '-';

    document.getElementById('detail-year').innerText =
        movie.year || '-';

    document.getElementById('detail-time').innerText =
        movie.time || '-';

    document.getElementById('detail-rating').innerText =
        movie.rating ?? '-';

    document.getElementById('detail-pos').innerText =
        movie.pos || '-';

    document.getElementById('detail-neg').innerText =
        movie.neg || '-';

    renderOtt(movie.ott);
}


function renderOtt(ottList) {

    const ottArea = document.getElementById('detail-ott');

    ottArea.innerHTML = '';

    if (!ottList || ottList.length === 0) {

        ottArea.innerHTML =
            `<div style="color:#666;">OTT 정보 없음</div>`;

        return;
    }

    ottList.forEach(o => {

        const div = document.createElement('div');

        div.style.cssText =
            'background:#1f1f1f;padding:10px;border-radius:4px;border:1px solid #333';

        let text = `${o.platform} | ${o.type}`;

        if (o.rent_price)
            text += ` | 대여 ${o.rent_price.toLocaleString()}원`;

        if (o.buy_price)
            text += ` | 구매 ${o.buy_price.toLocaleString()}원`;

        div.innerText = text;

        ottArea.appendChild(div);
    });
}

</script>
    
</body>
</html>
